# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "magga-mud"

[setup]
script = '''
set -e

cd "$CODEX_WORKTREE_PATH"

echo "[setup] workspace: $CODEX_WORKTREE_PATH"
echo "[setup] python: $(python3 --version 2>/dev/null || true)"
echo "[setup] node: $(node --version 2>/dev/null || true)"
echo "[setup] npm: $(npm --version 2>/dev/null || true)"

if [ -f requirements.txt ]; then
  python3 -m pip install -r requirements.txt
fi

if [ -f package.json ]; then
  npm install
fi

if [ -f mkdocs.yml ]; then
  python3 -m pip install mkdocs mkdocs-material
  mkdocs --version
fi

if [ -x ./run/setup.sh ]; then
  ./run/setup.sh
fi

echo "[setup] complete"
'''

[cleanup]
script = '''
set +e

cd "$CODEX_WORKTREE_PATH"

if [ -f docker-compose.yml ] || [ -f compose.yml ] || [ -f docker-compose.yaml ]; then
  docker compose down --remove-orphans
fi

rm -rf .cache/tmp

echo "[cleanup] complete"
'''

[[actions]]
name = "serve-docs"
icon = "tool"
command = "mkdocs serve -a 127.0.0.1:8000"

[[actions]]
name = "build-docs"
icon = "tool"
command = "mkdocs build --strict"
